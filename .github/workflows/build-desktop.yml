name: Publish desktop release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Versione semantica da pubblicare (es. v1.0.0)"
        required: true
        default: "v1.0.0"
        type: string

permissions:
  contents: write

jobs:
  macos:
    name: macOS (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            label: Intel
            artifact_label: macOS-Intel
          - runner: macos-14
            label: Apple Silicon
            artifact_label: macOS-Apple-Silicon
    env:
      RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          version="${RELEASE_VERSION#v}"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Use a semantic version such as v1.0.0; received: $RELEASE_VERSION" >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"
      - name: Install Homebrew Python with Tcl/Tk
        run: |
          # The Intel image also has python.org shims in /usr/local. Homebrew can
          # report their link conflict after the formulae were installed; validate
          # the isolated Homebrew interpreter instead of relying on that exit code.
          brew install python@3.12 python-tk@3.12 || true
          python_bin="$(brew --prefix python@3.12)/bin/python3.12"
          "$python_bin" -c "import tkinter"
          echo "PYTHON_BIN=$python_bin" >> "$GITHUB_ENV"
      - name: Create isolated build environment
        run: |
          "$PYTHON_BIN" -m venv .build-venv
          echo "BUILD_PYTHON=$GITHUB_WORKSPACE/.build-venv/bin/python" >> "$GITHUB_ENV"
      - name: Install build dependencies
        run: |
          "$BUILD_PYTHON" -m pip install --upgrade pip
          "$BUILD_PYTHON" -m pip install -e ".[dev]"
      - name: Run desktop unit and scheduler tests
        run: |
          "$BUILD_PYTHON" -m pytest tests/ -m "not ollama"
      - name: Build portable macOS ZIP
        env:
          VERSION: ${{ steps.version.outputs.value }}
          BUILD_LABEL: ${{ matrix.artifact_label }}
        run: |
          VERSION="$VERSION" BUILD_LABEL="$BUILD_LABEL" PYTHON_BIN="$BUILD_PYTHON" bash scripts/build_macos.sh
      - name: Smoke test packaged headless runner
        run: |
          smoke_root="$(mktemp -d)"
          export DDT_USER_CONFIG="$smoke_root/settings.json"
          export DDT_SMOKE_HOME="$smoke_root/DDT"
          "$BUILD_PYTHON" - <<'PY'
          import os
          from pathlib import Path
          from ddt_local.user_config import UserSettings, save_user_settings

          save_user_settings(
              UserSettings(ddt_home=Path(os.environ["DDT_SMOKE_HOME"]), setup_completed=True),
              Path(os.environ["DDT_USER_CONFIG"]),
          )
          PY
          ./dist/DDT\ Local\ Extractor.app/Contents/Resources/ddt-local-runner --run-once
          test -f "$DDT_SMOKE_HOME/data/ddt.sqlite3"
          test -f "$DDT_SMOKE_HOME/output/DDT_estratti.xlsx"
          codesign --verify --deep --strict "./dist/DDT Local Extractor.app"
          unzip -l dist/*.zip | grep -F "start.command"
          unzip -l dist/*.zip | grep -F "stop.command"
      - uses: actions/upload-artifact@v4
        with:
          name: ddt-local-extractor-${{ matrix.artifact_label }}
          path: dist/*.zip
          if-no-files-found: error

  windows:
    name: Windows (x64)
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $version = $env:RELEASE_VERSION -replace '^v', ''
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Use a semantic version such as v1.0.0; received: $env:RELEASE_VERSION"
          }
          "value=$version" >> $env:GITHUB_OUTPUT
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install -e ".[dev]"
      - name: Run desktop unit and scheduler tests
        shell: pwsh
        run: python -m pytest tests/ -m "not ollama"
      - name: Build portable Windows ZIP
        shell: pwsh
        run: .\scripts\build_windows.ps1 -Version "${{ steps.version.outputs.value }}"
      - name: Smoke test packaged headless runner
        shell: pwsh
        run: |
          $smokeRoot = Join-Path $env:RUNNER_TEMP "ddt-desktop-smoke"
          $env:DDT_USER_CONFIG = Join-Path $smokeRoot "settings.json"
          $env:DDT_SMOKE_HOME = Join-Path $smokeRoot "DDT"
          python -c "import os; from pathlib import Path; from ddt_local.user_config import UserSettings, save_user_settings; save_user_settings(UserSettings(ddt_home=Path(os.environ['DDT_SMOKE_HOME']), setup_completed=True), Path(os.environ['DDT_USER_CONFIG']))"
          $runner = Start-Process -FilePath ".\dist\DDT-Local-Extractor-${{ steps.version.outputs.value }}-Windows-x64\DDT Local Extractor\ddt-local-runner.exe" -ArgumentList "--run-once" -Wait -PassThru
          $runnerExitCode = $runner.ExitCode
          if ($runnerExitCode -ne 0) {
            $runnerLog = Join-Path $env:DDT_SMOKE_HOME "logs\desktop-runner.log"
            if (Test-Path $runnerLog) { Get-Content $runnerLog }
            throw "Packaged runner failed with exit code $runnerExitCode"
          }
          if (-not (Test-Path (Join-Path $env:DDT_SMOKE_HOME "data\ddt.sqlite3"))) { throw "SQLite not created" }
          if (-not (Test-Path (Join-Path $env:DDT_SMOKE_HOME "output\DDT_estratti.xlsx"))) { throw "Excel not created" }
          $archive = Get-ChildItem .\dist\*.zip | Select-Object -First 1
          if (-not $archive) { throw "Portable ZIP not created" }
          if (-not ((tar -tf $archive.FullName) -match "start.bat")) { throw "start.bat missing from portable ZIP" }
          if (-not ((tar -tf $archive.FullName) -match "stop.bat")) { throw "stop.bat missing from portable ZIP" }
      - uses: actions/upload-artifact@v4
        with:
          name: ddt-local-extractor-windows
          path: dist/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: [macos, windows]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.version || github.ref_name }}
    steps:
      - name: Collect desktop packages
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Publish release and packages
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: DDT Local Extractor ${{ env.RELEASE_TAG }}
          body: |
            Release desktop di DDT Local Extractor.

            Scarica lo ZIP adatto al tuo computer, estrailo e avvia `start.command` su macOS oppure `start.bat` su Windows. Su macOS, solo la prima volta: ctrl-clic su `start.command` → Apri → Apri; in seguito basta il doppio clic. Al primo avvio l'app chiede la cartella di lavoro e guida l'installazione di Ollama e dei modelli necessari.

            L'elaborazione automatica della inbox ogni cinque minuti si attiva o disattiva dalla dashboard. In alternativa, ogni ZIP include `stop.command` (macOS) o `stop.bat` (Windows).

            I PDF, il database e l'Excel restano sul computer.
          files: release-assets/*
          overwrite_files: true
